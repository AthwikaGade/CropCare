<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Manager Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #1e40af;
            --success-color: #22c55e;
            --error-color: #ef4444;
            --background-color: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            background-color: var(--background-color);
        }

        header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #addEventForm {
            display: grid;
            gap: 1rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-weight: 600;
            color: #374151;
        }

        input, textarea, select {
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            border-radius: 6px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        button {
            background-color: var(--primary-color);
            color: white;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: var(--secondary-color);
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .event-card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .event-card:hover {
            transform: translateY(-5px);
        }

        .event-image {
            height: 200px;
            background-color: #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: #666;
        }

        .event-content {
            padding: 1.5rem;
        }

        .event-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .event-actions button {
            flex: 1;
        }

        .delete-btn {
            background-color: var(--error-color);
        }

        .delete-btn:hover {
            background-color: #dc2626;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 1rem 2rem;
            border-radius: 6px;
            color: white;
            animation: slideIn 0.3s ease-out;
        }

        .toast.success {
            background-color: var(--success-color);
        }

        .toast.error {
            background-color: var(--error-color);
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem;
            }

            header h1 {
                font-size: 2rem;
            }

            .container {
                padding: 0 1rem;
            }

            .events-grid {
                grid-template-columns: 1fr;
            }
        }
        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: #2ecc71;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1><i class="fas fa-calendar-alt"></i> Event Manager Pro</h1>
        <p>Organize your events with style</p>
    </header>

    <div class="container">
            <a href="/admin_dashboard.html" class="back-button">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        <div class="card">
            <h2><i class="fas fa-plus-circle"></i> Add New Event</h2>
            <form id="addEventForm">
                <div class="form-group">
                    <label for="eventName">Event Name</label>
                    <input type="text" id="eventName" required>
                </div>

                <div class="form-group">
                    <label for="eventLocation">Location</label>
                    <input type="text" id="eventLocation" required>
                </div>

                <div class="form-group">
                    <label for="eventDate">Date & Time</label>
                    <input type="datetime-local" id="eventDate" required>
                </div>

                <div class="form-group">
                    <label for="eventType">Event Type</label>
                    <select id="eventType" required>
                        <option value="conference">Conference</option>
                        <option value="seminar">Seminar</option>
                        <option value="workshop">Workshop</option>
                        <option value="social">Social Gathering</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="eventDetails">Details</label>
                    <textarea id="eventDetails" rows="4" required></textarea>
                </div>

                <button type="submit">Create Event</button>
            </form>
        </div>

        <h2><i class="fas fa-list"></i> Upcoming Events</h2>
        <div id="eventsList" class="events-grid">
            <!-- Events will be dynamically loaded here -->
        </div>
    </div>

    <script>
        // Store API base URL
        const API_URL = 'http://localhost:3000/events';

        // Function to show toast notifications
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        // Function to format date
        function formatDate(dateString) {
            return new Date(dateString).toLocaleString();
        }

        // Function to get event icon based on type
        function getEventIcon(type) {
            const icons = {
                conference: 'fas fa-microphone',
                seminar: 'fas fa-chalkboard-teacher',
                workshop: 'fas fa-tools',
                social: 'fas fa-users'
            };
            return icons[type] || 'fas fa-calendar-day';
        }

        // Function to create event card
        function createEventCard(event) {
            return `
                <div class="event-card" data-id="${event.id}">
                    <div class="event-image">
                        <i class="${getEventIcon(event.type)}"></i>
                    </div>
                    <div class="event-content">
                        <h3>${event.name}</h3>
                        <p><i class="fas fa-map-marker-alt"></i> ${event.location}</p>
                        <p><i class="fas fa-clock"></i> ${formatDate(event.date)}</p>
                        <p>${event.details}</p>
                        <div class="event-actions">
                            <button onclick="editEvent(${event.id})">
                                <i class="fas fa-edit"></i> Edit
                            </button>
                            <button class="delete-btn" onclick="deleteEvent(${event.id})">
                                <i class="fas fa-trash"></i> Delete
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Function to load events
        async function loadEvents() {
            try {
                const response = await fetch(API_URL);
                const events = await response.json();
                const eventsList = document.getElementById('eventsList');
                eventsList.innerHTML = events.map(event => createEventCard(event)).join('');
            } catch (error) {
                showToast('Failed to load events', 'error');
            }
        }

        // Function to add new event
        async function addEvent(event) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(event),
                });

                if (response.ok) {
                    showToast('Event added successfully');
                    loadEvents();
                } else {
                    throw new Error('Failed to add event');
                }
            } catch (error) {
                showToast('Failed to add event', 'error');
            }
        }

        // Function to delete event
        async function deleteEvent(id) {
            if (confirm('Are you sure you want to delete this event?')) {
                try {
                    const response = await fetch(`${API_URL}/${id}`, {
                        method: 'DELETE',
                    });

                    if (response.ok) {
                        showToast('Event deleted successfully');
                        loadEvents();
                    } else {
                        throw new Error('Failed to delete event');
                    }
                } catch (error) {
                    showToast('Failed to delete event', 'error');
                }
            }
        }

        // Function to edit event
        async function editEvent(id) {
            try {
                const response = await fetch(`${API_URL}/${id}`);
                const event = await response.json();

                // Populate form with event data
                document.getElementById('eventName').value = event.name;
                document.getElementById('eventLocation').value = event.location;
                document.getElementById('eventDate').value = new Date(event.date)
                    .toISOString().slice(0, 16);
                document.getElementById('eventType').value = event.type;
                document.getElementById('eventDetails').value = event.details;

                // Change form submit behavior
                const form = document.getElementById('addEventForm');
                form.onsubmit = async (e) => {
                    e.preventDefault();
                    
                    const updatedEvent = {
                        name: document.getElementById('eventName').value,
                        location: document.getElementById('eventLocation').value,
                        date: document.getElementById('eventDate').value,
                        type: document.getElementById('eventType').value,
                        details: document.getElementById('eventDetails').value,
                    };

                    try {
                        const response = await fetch(`${API_URL}/${id}`, {
                            method: 'PUT',
                            headers: {
                                'Content-Type': 'application/json',
                            },
                            body: JSON.stringify(updatedEvent),
                        });

                        if (response.ok) {
                            showToast('Event updated successfully');
                            loadEvents();
                            form.reset();
                            // Reset form submit behavior
                            form.onsubmit = handleFormSubmit;
                        } else {
                            throw new Error('Failed to update event');
                        }
                    } catch (error) {
                        showToast('Failed to update event', 'error');
                    }
                };
            } catch (error) {
                showToast('Failed to load event details', 'error');
            }
        }

        // Handle form submission
        function handleFormSubmit(e) {
            e.preventDefault();
            const newEvent = {
                name: document.getElementById('eventName').value,
                location: document.getElementById('eventLocation').value,
                date: document.getElementById('eventDate').value,
                type: document.getElementById('eventType').value,
                details: document.getElementById('eventDetails').value,
            };
            addEvent(newEvent);
            e.target.reset();
        }

        // Initialize
        document.getElementById('addEventForm').onsubmit = handleFormSubmit;
        loadEvents();
    </script>
</body>
</html>
