<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - CropCare</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.7.0/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: #9b59b6;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .back-button {
            display: inline-block;
            padding: 10px 20px;
            background: #9b59b6;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-bottom: 20px;
        }

        .tab-container {
            margin-bottom: 20px;
        }

        .tab-button {
            padding: 10px 20px;
            border: none;
            background: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }

        .tab-button.active {
            border-bottom: 2px solid #9b59b6;
            color: #9b59b6;
        }

        canvas {
            width: 100% !important;
            height: 300px !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/farmer_dashboard.html" class="back-button">
            <i class="fas fa-arrow-left"></i> Back to Dashboard
        </a>

        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Farm Analytics</h1>
            <p>Track your farm's performance metrics</p>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Yield</h3>
                <h2>2,450 kg</h2>
                <p style="color: #2ecc71;">↑ 15% from last season</p>
            </div>
            <div class="stat-card">
                <h3>Revenue</h3>
                <h2>$12,500</h2>
                <p style="color: #2ecc71;">↑ 8% from last month</p>
            </div>
            <div class="stat-card">
                <h3>Resource Efficiency</h3>
                <h2>85%</h2>
                <p style="color: #e74c3c;">↓ 5% from target</p>
            </div>
            <div class="stat-card">
                <h3>Crop Health Index</h3>
                <h2>4.2/5.0</h2>
                <p style="color: #2ecc71;">↑ 0.3 from last week</p>
            </div>
        </div>

        <div class="tab-container">
            <button class="tab-button active">Yield Trends</button>
            <button class="tab-button">Resource Usage</button>
            <button class="tab-button">Financial Performance</button>
        </div>

        <div class="chart-container">
            <canvas id="yieldChart"></canvas>
        </div>

        <div class="chart-container">
            <canvas id="comparisonChart"></canvas>
        </div>
    </div>

    <script>
        // Yield Trend Chart
        const yieldCtx = document.getElementById('yieldChart').getContext('2d');
        new Chart(yieldCtx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
                datasets: [{
                    label: 'Crop Yield (kg)',
                    data: [350, 420, 380, 450, 480, 520],
                    borderColor: '#9b59b6',
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        // Comparison Chart
        const comparisonCtx = document.getElementById('comparisonChart').getContext('2d');
        new Chart(comparisonCtx, {
            type: 'bar',
            data: {
                labels: ['Plot A', 'Plot B', 'Plot C'],
                datasets: [{
                    label: 'Current Yield',
                    data: [850, 720, 680],
                    backgroundColor: '#9b59b6'
                }, {
                    label: 'Previous Season',
                    data: [750, 680, 620],
                    backgroundColor: '#bdc3c7'
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });

        // Tab functionality
        const tabButtons = document.querySelectorAll('.tab-button');
        tabButtons.forEach(button => {
            button.addEventListener('click', () => {
                tabButtons.forEach(btn => btn.classList.remove('active'));
                button.classList.add('active');
            });
        });
    </script>
</body>
</html>
